# Shinzo Docs Zola configuration

base_url = "https://docs.shinzo.network"
title = "Shinzo Developer Portal"
description = "Build the Read Layer of Truth"

compile_sass = true
build_search_index = true
minify_html = false

# Generate redirect/alias pages, taxonomy-free.
generate_feeds = false

[link_checker]
internal_level = "error"
external_level = "warn"

[markdown]
smart_punctuation = false
# No visible anchor links on headings. Heading ids are still generated, so the
# in-page table of contents continues to work.
insert_anchor_links = "none"
# Open external links in a new tab so the external-link icon CSS applies.
external_links_target_blank = true

# Syntax highlighting: emit CSS classes (.z-*) so our brand code colors in
# static/css/code-theme.css take effect.
[markdown.highlighting]
style = "class"
theme = "github-light"
# Register an "output" language so ```output fenced blocks keep a
# data-lang="output" attribute we can target with CSS (see sass/style.scss).
# The grammar itself does no highlighting; it just marks the text as plain.
extra_grammars = ["grammars/output.json"]

[search]
include_title = true
include_description = true
include_path = true
include_content = true

[extra]
tagline = "Build the Read Layer of Truth"
github_url = "https://github.com/shinzonetwork/"
og_image = "/img/shinzo-opengraph.png"
favicon = "/img/favicon.png"
# Plausible analytics
plausible_domain = "docs.shinzo.network"
plausible_src = "https://plausible.source.network/js/script.js"



# Top navigation bar
# ------------------
# - label: link text.
# - href: landing-page URL (literal path).
# - section: path prefix for active highlighting: active when the current path starts with "/{section}/".
# - root: optional; when true the entry is ALSO active at the site root ("/").

[[extra.navbar]]
label = "Understand"
href = "/understand/what-is-shinzo/"
section = "understand"

[[extra.navbar]]
label = "Build apps"
href = "/build/create-a-view/"
section = "build"

[[extra.navbar]]
label = "Run infrastructure"
href = "/run/get-started/"
section = "run"

[[extra.navbar]]
label = "Reference"
href = "/reference/architecture/"
section = "reference"
# ------------------



# Sidebar navigation tree (manual order, per section).
# ---------------------------------------
# Each [[extra.sidebar]] block is a group within a section's sidebar.
# - `section`: which top-level section this group belongs to ("understand",
#   "build", "run", "reference"). The macro filters by the current path so
#   only the active section's groups are shown. The home page has no sidebar.
# - `label`: group heading text.
# - `page`: optional path to a section _index.md; when set, the group label
#   is a link to that landing page.
# - `pages`: content paths relative to content/; page titles are resolved
#   from front matter.
# Pages are NOT auto-discovered: a new doc page must be listed here to appear.

# Understand
[[extra.sidebar]]
section = "understand"
label = "Basics"
pages = [
  "understand/what-is-shinzo/index.md",
  "understand/how-it-works/index.md",
]

[[extra.sidebar]]
section = "understand"
