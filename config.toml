# Shinzo Docs Zola configuration

base_url = "https://docs.shinzo.network"
title = "Shinzō Developer Portal"
description = "Build the Read Layer of Truth"

compile_sass = true
build_search_index = true
minify_html = false

# Generate redirect/alias pages, taxonomy-free.
generate_feeds = false

[link_checker]
internal_level = "error"
external_level = "warn"

[markdown]
smart_punctuation = false
# No visible anchor links on headings. Heading ids are still generated, so the
# in-page table of contents continues to work.
insert_anchor_links = "none"
# Open external links in a new tab so the external-link icon CSS applies.
external_links_target_blank = true

# Syntax highlighting: emit CSS classes (.z-*) so our brand code colors in
# static/css/code-theme.css take effect.
[markdown.highlighting]
style = "class"
theme = "github-light"

[search]
include_title = true
include_description = true
include_path = true
include_content = true

[extra]
tagline = "Build the Read Layer of Truth"
github_url = "https://github.com/shinzonetwork/"
og_image = "/img/shinzo-opengraph.png"
favicon = "/img/favicon.png"
# Plausible analytics
plausible_domain = "docs.shinzo.network"
plausible_src = "https://plausible.source.network/js/script.js"



# Top navigation bar
# ------------------
# - label: link text.
# - href: landing-page URL (literal path, e.g. "/generators/overview/").
# - section: path prefix for active highlighting: active when the current path starts with "/{section}/".
# - root: optional; when true the entry is ALSO active at the site root ("/"). Used by Introduction (landing at "/", pages under "/introduction/").

[[extra.navbar]]
label = "Introduction"
href = "/"
section = "introduction"
root = true

[[extra.navbar]]
label = "Generators"
href = "/generators/overview/"
section = "generators"

[[extra.navbar]]
label = "Hosts"
href = "/hosts/overview/"
section = "hosts"

[[extra.navbar]]
label = "Views"
href = "/views/overview/"
section = "views"

[[extra.navbar]]
label = "Guides"
href = "/guides/building-apps-with-shinzo/"
section = "guides"

[[extra.navbar]]
label = "Reference"
href = "/reference/architecture-overview/"
section = "reference"
# ------------------



# Sidebar navigation tree (manual order).
# ---------------------------------------
# Each [[extra.sidebar]] block is a top-level category, listed in display order. `pages` holds content paths relative to content/; page titles are resolved from front matter, so only the order and labels live here.
# - `root = true` (Introduction only) prepends the site landing page at "/".
# - `subsections` adds nested collapsible groups (only Reference uses one).
# Pages are NOT auto-discovered: a new doc page must be listed here to appear.

[[extra.sidebar]]
label = "Introduction"
root = true
pages = [
  "introduction/how-it-works/index.md",
  "introduction/core-concepts/index.md",
  "introduction/get-help/index.md",
]

[[extra.sidebar]]
label = "Generators"
pages = [
  "generators/overview/index.md",
  "generators/hardware-requirements/index.md",
  "generators/install/index.md",
  "generators/register/index.md",
  "generators/config-reference/index.md",
  "generators/faq/index.md",
]
subsections = [
  { label = "Deployment examples", pages = [
    "generators/deployment-examples/validator-local-geth/index.md",
    "generators/deployment-examples/managed-node-gcp/index.md",
    "generators/deployment-examples/nginx-tls-snapshots/index.md",
    "generators/deployment-examples/high-throughput-tuning/index.md",
